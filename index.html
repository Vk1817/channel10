
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#05070a;
  font-family:'Poppins',sans-serif;
  color:#fff;
}

/* HEADER */
header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,255,170,0.2);
}

.logo-text{
  font-size:22px;
  color:#00ffbf;
  font-weight:700;
  text-shadow:0 0 10px #00ffbf;
}

/* VIDEO */
.video-container{
  width:95%;
  height:50vh;
  margin:20px auto;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,255,200,0.3);
}

.video-container iframe{
  width:100%;
  height:100%;
  border:none;
}

/* LIVE BADGE */
.live{
  text-align:center;
  margin-top:10px;
  color:red;
  font-weight:600;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.5;}
  100%{opacity:1;}
}

/* MATCH TITLE */
.match{
  text-align:center;
  font-size:20px;
  margin:10px 0;
  font-weight:600;
}

/* AD BANNER */
.ad-container{
  width:92%;
  margin:20px auto;
  padding:6px;
  border-radius:18px;
  background:linear-gradient(135deg,#ff3c3c,#ff8c00,#6a00ff);
  box-shadow:0 0 25px rgba(255,60,60,0.4);
}

.ad-container img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:14px;
}

/* SECTION */
.section-box{
  width:92%;
  margin:15px auto;
  padding:15px;
  border-radius:14px;
  background:rgba(0,255,170,0.05);
  border:1px solid rgba(0,255,170,0.2);
  text-align:center;
}

.section-title{
  color:#00ffbf;
  margin-bottom:10px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ffbf,#0078ff);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

/* FLOAT BUTTONS */
.social{
  position:fixed;
  right:15px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.social a{
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 18px rgba(0,255,200,0.6);
}

.telegram{background:#0088cc;}
.instagram{
  background:radial-gradient(circle at 30% 110%,#fdf497,#fd5949,#d6249f,#285AEB);
}

.social img{
  width:26px;
}
</style>
</head>

<body>

<header>
  <div class="logo-text">CRICKCAST</div>
</header>

<!-- VIDEO -->
<div class="video-container">
  <iframe src="https://allrounder-live2.pages.dev/channel/tnt-2" allowfullscreen></iframe>
</div>

<div class="live">🔴 LIVE</div>
<div class="match">RCB vs SRH</div>

<!-- AD BANNER -->
<a href="#" target="_blank">
  <div class="ad-container">
    <img src="https://via.placeholder.com/1080x300.png?text=YOUR+AD+BANNER" alt="Ad">
  </div>
</a>

<!-- TELEGRAM -->
<div class="section-box">
  <div class="section-title">📢 Join Telegram</div>
  <a href="https://t.me/+r_4JF-IieX0wNjU9">
    <button class="btn">Join Now</button>
  </a>
</div>

<!-- SHARE -->
<div class="section-box">
  <div class="section-title">🔗 Share</div>
  <button class="btn" onclick="copyLink()">Copy Link</button>
</div>

<!-- FLOAT -->
<div class="social">
  <a href="https://t.me/+r_4JF-IieX0wNjU9" class="telegram">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  </a>
  <a href="https://www.instagram.com/crickcast.live" class="instagram">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>
</div>

<script>
function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link Copied!");
}
</script>

</body>
</html>
